<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="#ea580c"/>

  <!-- Beer mug body -->
  <rect x="24" y="30" width="38" height="44" rx="5" fill="white"/>

  <!-- Beer mug handle -->
  <path d="M62 40 h8 a7 7 0 0 1 0 14 h-8" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Beer foam top bumps -->
  <circle cx="32" cy="30" r="7" fill="#fde68a"/>
  <circle cx="44" cy="28" r="8" fill="#fde68a"/>
  <circle cx="55" cy="30" r="7" fill="#fde68a"/>

  <!-- Beer liquid inside -->
  <rect x="28" y="35" width="30" height="35" rx="3" fill="#fbbf24"/>

  <!-- Foam drip -->
  <rect x="36" y="30" width="4" height="10" rx="2" fill="#fde68a"/>

  <!-- Running figure (stick figure escaping) -->
  <!-- Head -->
  <circle cx="22" cy="72" r="3.5" fill="white"/>
  <!-- Body + legs suggesting running motion -->
  <line x1="22" y1="75.5" x2="22" y2="82" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="22" y1="82" x2="18" y2="88" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="22" y1="82" x2="27" y2="87" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arms -->
  <line x1="22" y1="77" x2="17" y2="80" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="22" y1="77" x2="27" y2="74" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Speed lines -->
  <line x1="10" y1="76" x2="15" y2="76" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="8" y1="80" x2="14" y2="80" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="11" y1="84" x2="16" y2="84" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
</svg>
